    <script>
        function toggleMenu() { document.getElementById("myDropdown").classList.toggle("show"); }
        const URL_JSON = 'france-spain.json?v=' + Date.now();
        let linkServer1 = "", linkServer2 = "", linkServer3 = "";

        function jalankanStream(linkUrl) {
            document.getElementById('player-youtube').style.display = 'none'; 
            document.getElementById('player-biasa').style.display = 'none';
            if (linkUrl.includes("youtube.com") || linkUrl.includes("youtu.be")) {
                const id = linkUrl.split('/').pop().replace('watch?v=', '');
                document.getElementById('player-youtube').src = "https://www.youtube.com/embed/" + id + "?autoplay=1";
                document.getElementById('player-youtube').style.display = 'block';
            } else {
                const p = document.getElementById('player-biasa');
                p.src = linkUrl; p.style.display = 'block'; p.play().catch(() => {});
            }
        }

        function pindahServer(n) {
            document.querySelectorAll('.btn-server').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-server' + n).classList.add('active');
            document.getElementById('status-server-text').innerText = "Playing: Server " + n;
            jalankanStream(n === 1 ? linkServer1 : n === 2 ? linkServer2 : linkServer3);
        }

        fetch(URL_JSON).then(res => res.json()).then(data => {
            linkServer1 = data[1]; linkServer2 = data[2]; linkServer3 = data[3];
            document.getElementById('web-match-title').innerText = data[5];
            document.getElementById('server-box').style.display = 'block';
            pindahServer(1);
        });
    </script>
