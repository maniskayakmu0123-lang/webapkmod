    <script>
        function toggleMenu() { document.getElementById("myDropdown").classList.toggle("show"); }
        window.onclick = function(event) { if (!event.target.matches('.menu-icon') && !event.target.matches('.fa-bars')) { var dropdowns = document.getElementsByClassName("dropdown-menu"); for (var i = 0; i < dropdowns.length; i++) { if (dropdowns[i].classList.contains('show')) { dropdowns[i].classList.remove('show'); } } } }

        const playerBiasa = document.getElementById('player-biasa');
        const playerYoutube = document.getElementById('player-youtube');
        const waitingImg = document.getElementById('waiting-image');
        const serverBox = document.getElementById('server-box');
        const statusText = document.getElementById('status-server-text');
        const btnServer1 = document.getElementById('btn-server1');
        const btnServer2 = document.getElementById('btn-server2');
        const btnServer3 = document.getElementById('btn-server3');
        const hdServersBox = document.getElementById('hd-servers-box');
        
        const URL_JSON = '/stream.json?v=' + new Date().getTime();

        let linkServer1 = "", linkServer2 = "", linkServer3 = "";

        function getYoutubeId(url) { const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/; const match = url.match(regExp); return (match && match[2].length === 11) ? match[2] : null; }

        function jalankanStream(linkUrl) {
            if (!linkUrl || linkUrl === "-") return;
            waitingImg.style.display = 'none'; playerYoutube.style.display = 'none'; playerBiasa.style.display = 'none'; playerYoutube.src = "";
            const ytId = getYoutubeId(linkUrl);
            if (ytId) { playerYoutube.src = "https://www.youtube.com/embed/" + ytId + "?autoplay=1"; playerYoutube.style.display = 'block'; } 
            else { playerBiasa.src = linkUrl; playerBiasa.style.display = 'block'; playerBiasa.play().catch(() => console.log("Menunggu interaksi.")); }
        }

        function resetActiveButtons() { btnServer1.classList.remove('active'); btnServer2.classList.remove('active'); btnServer3.classList.remove('active'); }
        function pindahServer(nomorServer) {
            resetActiveButtons(); statusText.innerText = "Playing: Server " + nomorServer;
            if (nomorServer === 1) { btnServer1.classList.add('active'); jalankanStream(linkServer1); } 
            else if (nomorServer === 2) { btnServer2.classList.add('active'); jalankanStream(linkServer2); } 
            else if (nomorServer === 3) { btnServer3.classList.add('active'); jalankanStream(linkServer3); }
        }

        fetch(URL_JSON).then(res => res.json()).then(data => {
            const linkFoto = data[0]?.trim(); 
            linkServer1 = data[1]?.trim(); 
            linkServer2 = data[2]?.trim(); 
            linkServer3 = data[3]?.trim(); 
            const linkWaiting = data[4]?.trim(); 
            const namaTanding = data[5]?.trim(); 
            
            if (linkFoto) { document.getElementById('logo-container').style.display = 'block'; document.getElementById('foto-atas').src = linkFoto; }
            if (namaTanding && namaTanding !== "-" && namaTanding.length > 2) { document.getElementById('web-match-title').innerText = namaTanding; document.title = "Live Streaming " + namaTanding; }
            
            const adaServer1 = linkServer1 && linkServer1 !== "-", adaServer2 = linkServer2 && linkServer2 !== "-", adaServer3 = linkServer3 && linkServer3 !== "-";
            if (adaServer1 || adaServer2 || adaServer3) {
                serverBox.style.display = 'block'; 
                btnServer1.style.display = adaServer1 ? 'inline-block' : 'none'; 
                btnServer2.style.display = adaServer2 ? 'inline-block' : 'none'; 
                btnServer3.style.display = adaServer3 ? 'inline-block' : 'none';
                
                // 3 Server HD Oranye otomatis muncul bersamaan saat live streaming siap
                hdServersBox.style.display = 'flex';
                
                if (adaServer1) pindahServer(1); else if (adaServer2) pindahServer(2); else if (adaServer3) pindahServer(3);
            } else { waitingImg.src = linkWaiting; waitingImg.style.display = 'block'; }
        }).catch(err => console.error("Gagal memuat stream.json:", err));
    </script>
